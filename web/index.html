<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>주식 알림</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>📈 주식 알림</h1>
  <button id="refresh-btn" title="새로고침">↻</button>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="positions">💼 내 포지션</button>
  <button class="tab" data-tab="predict">📊 오늘 예측</button>
  <button class="tab" data-tab="watchlist">👀 관심종목</button>
</nav>

<main>
  <!-- 내 포지션 탭 -->
  <section id="tab-positions" class="tab-panel active">
    <div id="positions-summary" class="summary-card">
      <div class="summary-row"><span>보유 종목</span><span id="sum-count">-</span></div>
      <div class="summary-row"><span>총 매입</span><span id="sum-cost">-</span></div>
      <div class="summary-row"><span>총 평가</span><span id="sum-value">-</span></div>
      <div class="summary-row big"><span>총 손익</span><span id="sum-pnl">-</span></div>
    </div>

    <div id="positions-list"></div>

    <button id="add-btn" class="add-btn">+ 종목 추가</button>
  </section>

  <!-- 오늘 예측 탭 -->
  <section id="tab-predict" class="tab-panel">
    <div class="slot-picker" id="slot-picker">
      <button class="slot-btn active" data-slot="latest">최신</button>
      <button class="slot-btn" data-slot="overnight">🌙 자정</button>
      <button class="slot-btn" data-slot="morning">🌅 아침</button>
      <button class="slot-btn" data-slot="midday">🍱 점심</button>
      <button class="slot-btn" data-slot="afternoon">⏰ 오후</button>
      <button class="slot-btn" data-slot="closing">🔔 마감</button>
    </div>
    <div id="briefing-meta" class="meta"></div>
    <pre id="briefing-text" class="briefing-text"></pre>
    <button id="run-predict-btn" class="secondary-btn">🤖 지금 새 브리핑 생성 (Gemini 호출)</button>
  </section>

  <!-- 관심종목 탭 -->
  <section id="tab-watchlist" class="tab-panel">
    <div id="watchlist-list"></div>
  </section>
</main>

<!-- 종목 추가 모달 -->
<div id="add-modal" class="modal hidden">
  <div class="modal-body">
    <h2>종목 추가</h2>
    <form id="add-form">
      <label>종목 선택
        <select id="f-code" required></select>
      </label>
      <label>매수가 (원)
        <input id="f-price" type="number" inputmode="numeric" required placeholder="예: 195000">
      </label>
      <label>수량 (주)
        <input id="f-qty" type="number" inputmode="numeric" required placeholder="예: 10">
      </label>
      <label>메모 (선택)
        <input id="f-note" type="text" placeholder="예: HBM 모멘텀 기대">
      </label>
      <details>
        <summary>⚙️ 고급 설정</summary>
        <label>목표가 (원) - 도달 시 긴급알림
          <input id="f-target" type="number" inputmode="numeric" placeholder="선택">
        </label>
        <label>손절가 (원) - 도달 시 긴급알림
          <input id="f-stop" type="number" inputmode="numeric" placeholder="선택">
        </label>
        <label>매수일 (선택)
          <input id="f-date" type="date">
        </label>
      </details>
      <div class="modal-actions">
        <button type="button" id="cancel-btn" class="secondary-btn">취소</button>
        <button type="submit" class="primary-btn">저장</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/app.js"></script>
</body>
</html>
