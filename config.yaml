# 거시 지표 (글로벌 시그널)
macro:
  - ticker: "NVDA"
    name: "엔비디아"
    relevance: "삼성전자, SK하이닉스"
  - ticker: "CL=F"
    name: "WTI 원유"
    relevance: "정유, 항공, 자동차"
  - ticker: "KRW=X"
    name: "원·달러 환율"
    relevance: "수출주, 반도체, 자동차"
  - ticker: "^GSPC"
    name: "S&P 500"
    relevance: "전반적 시장 심리"
  - ticker: "^IXIC"
    name: "나스닥"
    relevance: "기술주, 반도체"

# 알림 시간 (24시간제, 한국시간)
schedule:
  morning_brief: "08:00"
  noon_update: "12:30"
  closing_brief: "15:40"

# 실시간 경보 기준
alerts:
  price_change_pct_mid: 3.0      # 🟡 참고
  price_change_pct_high: 5.0     # 🔴 긴급
  volume_spike_multiple: 5.0     # 거래량 X배 이상
  cooldown_minutes: 60           # 같은 종목 같은 사유 중복 억제

# LLM 설정
llm:
  provider: "gemini"             # gemini | claude
  model: "gemini-2.5-flash"
  temperature: 0.3
