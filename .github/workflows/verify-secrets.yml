name: Verify Secrets

# 수동 실행 전용: 4개 Secrets이 모두 등록됐는지만 확인 (API 호출 없음, 쿼터 소모 없음).
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check GEMINI_API_KEY
        env:
          S: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$S" ]; then echo "::error::GEMINI_API_KEY MISSING"; exit 1; fi
          echo "GEMINI_API_KEY OK (length: ${#S})"

      - name: Check NTFY_TOPIC
        env:
          S: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$S" ]; then echo "::error::NTFY_TOPIC MISSING"; exit 1; fi
          echo "NTFY_TOPIC OK (length: ${#S})"

      - name: Check UPSTASH_REDIS_REST_URL
        env:
          S: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        run: |
          if [ -z "$S" ]; then echo "::error::UPSTASH_REDIS_REST_URL MISSING"; exit 1; fi
          echo "UPSTASH_REDIS_REST_URL OK (prefix: ${S:0:20}...)"

      - name: Check UPSTASH_REDIS_REST_TOKEN
        env:
          S: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$S" ]; then echo "::error::UPSTASH_REDIS_REST_TOKEN MISSING"; exit 1; fi
          echo "UPSTASH_REDIS_REST_TOKEN OK (length: ${#S})"

      - name: Redis ping (real connectivity test)
        env:
          URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TOK: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          RESP=$(curl -sS -X POST "$URL" -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" -d '["PING"]')
          echo "Redis response: $RESP"
          echo "$RESP" | grep -q '"PONG"' && echo "✅ Upstash Redis connectivity OK" || (echo "::error::Upstash Redis ping failed"; exit 1)

      - name: Summary
        run: echo "🎉 All 4 secrets present and Upstash Redis reachable."
